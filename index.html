
<!DOCTYPE html>
<html>
<head>
  <title>Soumi's Daily Tasks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

  <h2>Soumi's Daily Tasks</h2>
  <button class="btn btn-secondary mb-3" onclick="loadDashboard()">📊 Dashboard</button>

  <ul id="todo-list" class="list-group mb-4"></ul>

  <div id="dashboard"></div>

</div>

<script>

// 🔴 PUT YOUR LINKS HERE
const TASK_URL = "https://opensheet.elk.sh/1NiISDATm9eVs30wIMV54oB3iWzc07258UXUUb5kHJdI/Sheet1";
const COMPLETED_URL = "https://opensheet.elk.sh/1NiISDATm9eVs30wIMV54oB3iWzc07258UXUUb5kHJdI/Completed";
const API_URL = "https://script.google.com/macros/s/AKfycbz8WmW4DPVxChAWtHcT_KygSttcOeYTTFKOF9NIEA66wd3TE8sPKR_j8Ka9sxfdYYg4/exec";

// LOAD TASKS

function loadTodos() {
const t = new Date().getTime();   // 👈 ADD THIS

  Promise.all([
    fetch(TASK_URL + "?t=" + t, { cache: "no-store" }).then(res => res.json()),
    fetch(COMPLETED_URL + "?t=" + t, { cache: "no-store" }).then(res => res.json())
  ])
  .then(([tasks, completed]) => {
  /*fetch(TASK_URL)
    .then(res => res.json())
    .then(data => {*/

      let list = document.getElementById("todo-list");
      list.innerHTML = "";

      let today = new Date();

      data.forEach(row => {

        let taskID = String(row.ID);

        // ✅ CHECK LOCAL STORAGE FIRST
        if (localStorage.getItem("done_" + taskID) === "true") {
          return;
        }

        // ✅ DATE CHECK
        let parts = row.Date.split("/");
        let sheetDate = new Date(
          today.getFullYear(),
          parts[0] - 1,
          parts[1]
        );

        if (today.toDateString() !== sheetDate.toDateString()) return;

        // UI
        let li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between align-items-center";

        let text = document.createElement("span");
        text.innerText = row.Task;

        let checkbox = document.createElement("input");
        checkbox.type = "checkbox";

        checkbox.onchange = () => completeTask(row, li);

        li.appendChild(text);
        li.appendChild(checkbox);

        list.appendChild(li);
      });

    });
}
// COMPLETE TASK
function completeTask(row, li) {

  let taskID = String(row.ID);

  // ✅ Save locally
  localStorage.setItem("done_" + taskID, "true");

  // ✅ Send to backend
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      id: row.ID,
      task: row.Task,
      date: row.Date
    })
  });

  // ✅ Remove from UI
  li.remove();
}

// DASHBOARD
function loadDashboard() {

  fetch(COMPLETED_URL)
    .then(res => res.json())
    .then(data => {

      let grouped = {};
      data.forEach(row => {
        if (!grouped[row.Date]) grouped[row.Date] = [];
        grouped[row.Date].push(row.Task);
      });

      let html = "<h3>Completed Tasks</h3>";

      for (let date in grouped) {
        html += `<h5>${date}</h5><ul>`;
        grouped[date].forEach(t => {
          html += `<li>${t}</li>`;
        });
        html += "</ul>";
      }

      document.getElementById("dashboard").innerHTML = html;
    });
}

// AUTO LOAD
loadTodos();

</script>

</body>
</html>
