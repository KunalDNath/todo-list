
<!DOCTYPE html>
<html>
<head>
  <title>Soumi's Daily Tasks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

  <h2>Soumi's Daily Tasks</h2>
  <button class="btn btn-secondary mb-3" onclick="loadDashboard()">📊 Dashboard</button>

  <ul id="todo-list" class="list-group mb-4"></ul>

  <div id="dashboard"></div>

</div>

<script>

// 🔴 PUT YOUR LINKS HERE
const TASK_URL = "https://opensheet.elk.sh/1NiISDATm9eVs30wIMV54oB3iWzc07258UXUUb5kHJdI/Sheet1";
const COMPLETED_URL = "https://opensheet.elk.sh/1NiISDATm9eVs30wIMV54oB3iWzc07258UXUUb5kHJdI/Completed";
const API_URL = "https://script.google.com/macros/s/AKfycbz8WmW4DPVxChAWtHcT_KygSttcOeYTTFKOF9NIEA66wd3TE8sPKR_j8Ka9sxfdYYg4/exec";

// LOAD TASKS

function loadTodos() {

  Promise.all([
    fetch(TASK_URL).then(r => r.json()),
    fetch(COMPLETED_URL).then(r => r.json())
  ])
  .then(([tasks, completed]) => {

    let list = document.getElementById("todo-list");
    list.innerHTML = "";

    // get completed task names
    let done = completed.map(x => x.Task);

    tasks.forEach(row => {

      // ❌ skip if task name already in completed
      if (done.includes(row.Task)) return;

      let li = document.createElement("li");
      li.innerText = row.Task;

      let checkbox = document.createElement("input");
      checkbox.type = "checkbox";

      checkbox.onclick = () => completeTask(row, li);

      li.appendChild(checkbox);
      list.appendChild(li);
    });

  });
}
// COMPLETE TASK
function completeTask(row, li) {

  let taskID = String(row.ID);

  // ✅ Save locally
  localStorage.setItem("done_" + taskID, "true");

  // ✅ Send to backend
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      id: row.ID,
      task: row.Task,
      date: row.Date
    })
  });

  // ✅ Remove from UI
  li.remove();
}

// DASHBOARD
function loadDashboard() {

  fetch(COMPLETED_URL)
    .then(res => res.json())
    .then(data => {

      let grouped = {};
      data.forEach(row => {
        if (!grouped[row.Date]) grouped[row.Date] = [];
        grouped[row.Date].push(row.Task);
      });

      let html = "<h3>Completed Tasks</h3>";

      for (let date in grouped) {
        html += `<h5>${date}</h5><ul>`;
        grouped[date].forEach(t => {
          html += `<li>${t}</li>`;
        });
        html += "</ul>";
      }

      document.getElementById("dashboard").innerHTML = html;
    });
}

// AUTO LOAD
loadTodos();

</script>

</body>
</html>
